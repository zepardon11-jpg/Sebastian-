<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Sebastian AI - Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: url('https://files.catbox.moe/6prrvs.jpg') no-repeat center center fixed;
            background-size: cover;
            overflow-x: hidden;
            height: 100vh;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.55);
            z-index: 0;
        }

        .chat-wrapper {
            position: relative;
            z-index: 2;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        .slide-panel {
            position: fixed;
            top: 0;
            left: -300px;
            width: 300px;
            height: 100%;
            background: rgba(10, 10, 20, 0.97);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(139, 92, 246, 0.3);
            transition: left 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            z-index: 20;
            padding: 24px 18px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            overflow-y: auto;
            box-shadow: 4px 0 30px rgba(0,0,0,0.6);
        }

        .slide-panel.open {
            left: 0;
        }

        .panel-section {
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 20px;
        }

        .panel-section h3 {
            color: #c4b5fd;
            font-size: 13px;
            letter-spacing: 1.5px;
            margin-bottom: 14px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .role-badge {
            background: rgba(139, 92, 246, 0.2);
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 13px;
            color: white;
            border-left: 3px solid #8b5cf6;
        }

        .api-input, .prompt-textarea {
            width: 100%;
            padding: 10px 14px;
            background: rgba(0,0,0,0.6);
            border: 1px solid #3f3f55;
            border-radius: 16px;
            color: white;
            margin-top: 8px;
            font-size: 13px;
            font-family: monospace;
        }

        .prompt-textarea {
            min-height: 120px;
            resize: vertical;
            font-size: 12px;
            line-height: 1.4;
        }

        .api-input:focus, .prompt-textarea:focus {
            outline: none;
            border-color: #8b5cf6;
        }

        .save-btn {
            background: #2d2d44;
            border: none;
            padding: 8px 12px;
            border-radius: 30px;
            color: white;
            font-size: 12px;
            margin-top: 10px;
            cursor: pointer;
            width: 100%;
            transition: 0.2s;
        }

        .save-btn:hover {
            background: #8b5cf6;
        }

        .copy-btn {
            background: #2d2d44;
            border: none;
            padding: 4px 10px;
            border-radius: 20px;
            color: white;
            font-size: 10px;
            cursor: pointer;
            margin-left: 8px;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .copy-btn:hover {
            background: #8b5cf6;
        }

        .message-header {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 4px;
        }

        .ai-msg-wrapper {
            max-width: 80%;
            align-self: flex-start;
            position: relative;
        }

        .ai-msg {
            background: rgba(25, 25, 40, 0.95);
            backdrop-filter: blur(4px);
            color: #f0f0f0;
            border-bottom-left-radius: 6px;
            border-left: 3px solid #8b5cf6;
            padding: 12px 18px;
            border-radius: 24px;
            font-size: 15px;
            line-height: 1.45;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .history-list {
            list-style: none;
            margin-top: 8px;
        }

        .history-list li {
            background: rgba(255,255,255,0.05);
            margin: 6px 0;
            padding: 10px;
            border-radius: 14px;
            font-size: 12px;
            color: #ddd;
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: 0.1s;
        }

        .history-list li:hover {
            background: rgba(139, 92, 246, 0.3);
        }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            margin-left: 0;
            transition: margin-left 0.3s;
            height: 100vh;
            position: relative;
        }

        .chat-header {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(12px);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .menu-icon {
            font-size: 26px;
            cursor: pointer;
            color: white;
            background: rgba(255,255,255,0.1);
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: 0.2s;
        }

        .menu-icon:hover {
            background: #8b5cf6;
            transform: scale(1.02);
        }

        .ai-title {
            color: white;
            font-size: 20px;
            font-weight: 700;
        }

        .ai-title span {
            color: #a78bfa;
            font-size: 12px;
            margin-left: 8px;
            background: rgba(0,0,0,0.4);
            padding: 2px 8px;
            border-radius: 20px;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            max-width: 80%;
            padding: 12px 18px;
            border-radius: 24px;
            font-size: 15px;
            line-height: 1.45;
            animation: fadeIn 0.2s ease;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .user-msg {
            align-self: flex-end;
            background: linear-gradient(135deg, #8b5cf6, #6d28d9);
            color: white;
            border-bottom-right-radius: 6px;
        }

        .input-area {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(12px);
            padding: 16px 24px;
            display: flex;
            gap: 12px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .input-area input {
            flex: 1;
            padding: 12px 20px;
            background: rgba(0,0,0,0.5);
            border: 1px solid #3f3f55;
            border-radius: 40px;
            color: white;
            font-size: 15px;
        }

        .input-area input:focus {
            outline: none;
            border-color: #8b5cf6;
        }

        .input-area button {
            background: #8b5cf6;
            border: none;
            padding: 0 28px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .input-area button:hover {
            background: #7c3aed;
        }

        .toast-notif {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #8b5cf6;
            color: white;
            padding: 10px 18px;
            border-radius: 30px;
            font-size: 13px;
            z-index: 999;
            opacity: 0;
            transition: 0.2s;
            pointer-events: none;
        }

        .toast-notif.show {
            opacity: 1;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px);}
            to { opacity: 1; transform: translateY(0);}
        }

        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-track {
            background: #1e1e2e;
        }
        ::-webkit-scrollbar-thumb {
            background: #8b5cf6;
            border-radius: 10px;
        }
    </style>
</head>
<body>
<div class="chat-wrapper">
    <div id="slidePanel" class="slide-panel">
        <div class="panel-section">
            <h3>📡 IDENTITY</h3>
            <div class="role-badge" id="roleDisplay">Role: --</div>
            <div style="margin-top: 12px; font-size:13px; color:#aaa;">👤 <span id="usernameDisplay"></span></div>
            <div style="margin-top: 8px; font-size:11px; color:#6b6b8d;" id="promptStatus">📄 Prompt.txt: Loading...</div>
        </div>

        <div class="panel-section">
            <h3>✏️ EDIT SYSTEM PROMPT</h3>
            <textarea id="systemPromptEditor" class="prompt-textarea" placeholder="Edit system prompt sesuai keinginan..."></textarea>
            <button id="savePromptBtn" class="save-btn">💾 Simpan Prompt</button>
            <button id="resetPromptBtn" class="save-btn" style="background:#3f2e3e;">↺ Reset ke Default</button>
        </div>

        <div class="panel-section">
            <h3>🔑 OPENROUTER API KEY</h3>
            <input type="password" id="apiKeyInput" class="api-input" placeholder="Masukkan OpenRouter API Key">
            <button id="saveApiKey" class="save-btn">Simpan Key</button>
            <div style="font-size: 11px; color:#c4b5fd; margin-top: 12px; margin-bottom: 4px;">Pilih Model:</div>
            <select id="modelSelect" class="api-input" style="margin-top:0; background:#1a1a2e; color:white;">
                <option value="openrouter/free">Auto (pilih free model aktif)</option>
                <option value="deepseek/deepseek-v4-flash">DeepSeek V4 Flash (free)</option>
                <option value="meta-llama/llama-3.3-70b-instruct:free">Llama 3.3 70B (free)</option>
                <option value="qwen/qwen3-235b-a22b:free">Qwen3 235B (free)</option>
                <option value="google/gemma-3-12b-it:free">Gemma 3 12B (free)</option>
                <option value="nousresearch/hermes-3-llama-3.1-405b:free">Hermes 3 405B (free)</option>
            </select>
        </div>

        <div class="panel-section">
            <h3>📜 RIWAYAT CHAT</h3>
            <ul id="historyList" class="history-list">
                <li style="color:#6b6b8d;">Belum ada riwayat</li>
            </ul>
            <button id="clearHistory" class="save-btn" style="background:#3f2e3e;">Hapus Riwayat</button>
        </div>
        <div style="margin-top: auto; font-size:11px; text-align:center; color:#555;">Sebastian AI ⚡ DeepSeek V4 Flash</div>
    </div>

    <div class="chat-area">
        <div class="chat-header">
            <div class="menu-icon" id="menuToggle">☰</div>
            <div class="ai-title">Sebastian <span>⚡ DeepSeek V4 Flash</span></div>
        </div>

        <div id="messages" class="messages-container">
            <div class="message ai-msg">Memuat system prompt dari server...</div>
        </div>

        <div class="input-area">
            <input type="text" id="userInput" placeholder="Ketik pesan..." autocomplete="off">
            <button id="sendBtn">Kirim</button>
        </div>
    </div>
</div>
<div id="toastNotif" class="toast-notif">📋 Tersalin!</div>

<script>
    let systemPrompt = "";
    let openRouterApiKey = localStorage.getItem('openrouter_api_key') || '';
    let chatHistory = JSON.parse(localStorage.getItem('sebastian_chat_history')) || [];
    const currentUser = localStorage.getItem('sebastian_user') || 'Guest';
    const currentRole = localStorage.getItem('sebastian_role') || 'member';

    const roleDisplay = document.getElementById('roleDisplay');
    const usernameDisplay = document.getElementById('usernameDisplay');
    const promptStatusSpan = document.getElementById('promptStatus');
    const messagesContainer = document.getElementById('messages');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const menuToggle = document.getElementById('menuToggle');
    const slidePanel = document.getElementById('slidePanel');
    const apiKeyInput = document.getElementById('apiKeyInput');
    const saveApiKeyBtn = document.getElementById('saveApiKey');
    const clearHistoryBtn = document.getElementById('clearHistory');
    const historyList = document.getElementById('historyList');
    const systemPromptEditor = document.getElementById('systemPromptEditor');
    const savePromptBtn = document.getElementById('savePromptBtn');
    const resetPromptBtn = document.getElementById('resetPromptBtn');
    const toastNotif = document.getElementById('toastNotif');

    function showToast(message = '📋 Tersalin!') {
        toastNotif.innerText = message;
        toastNotif.classList.add('show');
        setTimeout(() => toastNotif.classList.remove('show'), 2000);
    }

    async function copyToClipboard(text) {
        try {
            await navigator.clipboard.writeText(text);
            showToast('✅ Tersalin ke clipboard');
        } catch(e) {
            prompt('Salin manual (Ctrl+C):', text);
            showToast('⚠️ Salin manual');
        }
    }

    function appendAiMessageWithCopy(text) {
        const wrapper = document.createElement('div');
        wrapper.classList.add('ai-msg-wrapper');
        
        const headerDiv = document.createElement('div');
        headerDiv.classList.add('message-header');
        const copyButton = document.createElement('button');
        copyButton.innerHTML = '📋 Salin';
        copyButton.classList.add('copy-btn');
        copyButton.onclick = () => copyToClipboard(text);
        headerDiv.appendChild(copyButton);
        
        const msgDiv = document.createElement('div');
        msgDiv.classList.add('ai-msg');
        msgDiv.innerText = text;
        
        wrapper.appendChild(headerDiv);
        wrapper.appendChild(msgDiv);
        messagesContainer.appendChild(wrapper);
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    usernameDisplay.innerText = currentUser;
    roleDisplay.innerHTML = `Role: ${currentRole.toUpperCase()}`;
    if(openRouterApiKey) apiKeyInput.value = openRouterApiKey;

    async function loadSystemPrompt() {
        try {
            const response = await fetch('/prompt.txt?t=' + Date.now());
            if (response.ok) {
                systemPrompt = await response.text();
                systemPromptEditor.value = systemPrompt;
                promptStatusSpan.innerText = systemPrompt.trim().length > 0 
                    ? `📄 Prompt.txt: Loaded (${systemPrompt.length} chars)` 
                    : "📄 Prompt.txt: Kosong";
            } else {
                promptStatusSpan.innerText = "📄 Prompt.txt: Tidak ditemukan";
                systemPrompt = "Kamu adalah Sebastian, asisten AI yang cerdas, ramah, dan membantu. Gunakan bahasa Indonesia.";
                systemPromptEditor.value = systemPrompt;
            }
        } catch(e) {
            promptStatusSpan.innerText = "📄 Prompt.txt: Gagal load";
            systemPrompt = "Kamu adalah Sebastian, asisten AI yang cerdas, ramah, dan membantu. Gunakan bahasa Indonesia.";
            systemPromptEditor.value = systemPrompt;
        }
        
        const savedPrompt = localStorage.getItem('sebastian_custom_prompt');
        if(savedPrompt && savedPrompt.trim().length > 10) {
            systemPrompt = savedPrompt;
            systemPromptEditor.value = systemPrompt;
            promptStatusSpan.innerText = `✏️ Custom Prompt (${systemPrompt.length} chars)`;
        }
        
        const welcomeDiv = document.querySelector('#messages .message.ai-msg');
        if(welcomeDiv && welcomeDiv.innerText.includes('Memuat system prompt')) {
            messagesContainer.innerHTML = '<div class="message ai-msg">Halo! Saya Sebastian (DeepSeek V4 Flash). Silakan kirim pesan.</div>';
        }
    }

    savePromptBtn.addEventListener('click', () => {
        const newPrompt = systemPromptEditor.value.trim();
        if(newPrompt.length < 5) {
            showToast('❌ Prompt terlalu pendek (min 5 karakter)');
            return;
        }
        systemPrompt = newPrompt;
        localStorage.setItem('sebastian_custom_prompt', systemPrompt);
        promptStatusSpan.innerText = `✏️ Custom Prompt (${systemPrompt.length} chars)`;
        showToast('✅ System prompt berhasil disimpan');
    });

    resetPromptBtn.addEventListener('click', async () => {
        localStorage.removeItem('sebastian_custom_prompt');
        try {
            const response = await fetch('/prompt.txt?t=' + Date.now());
            if (response.ok) {
                systemPrompt = await response.text();
            } else {
                systemPrompt = "Kamu adalah Sebastian, asisten AI yang cerdas, ramah, dan membantu. Gunakan bahasa Indonesia.";
            }
        } catch(e) {
            systemPrompt = "Kamu adalah Sebastian, asisten AI yang cerdas, ramah, dan membantu. Gunakan bahasa Indonesia.";
        }
        systemPromptEditor.value = systemPrompt;
        promptStatusSpan.innerText = `📄 Prompt.txt: Default (${systemPrompt.length} chars)`;
        showToast('↺ Prompt direset ke default');
    });

    function renderHistory() {
        if(chatHistory.length === 0) {
            historyList.innerHTML = '<li style="color:#6b6b8d;">Belum ada riwayat</li>';
            return;
        }
        historyList.innerHTML = chatHistory.map((item, idx) => {
            let preview = item.user.length > 35 ? item.user.substring(0,35)+'...' : item.user;
            return `<li data-index="${idx}">💬 ${escapeHtml(preview)}</li>`;
        }).join('');
        document.querySelectorAll('#historyList li[data-index]').forEach(li => {
            li.addEventListener('click', function() {
                const idx = parseInt(this.getAttribute('data-index'));
                const oldMsg = chatHistory[idx];
                if(oldMsg) {
                    messagesContainer.innerHTML = '';
                    appendMessage(oldMsg.user, true);
                    appendAiMessageWithCopy(oldMsg.ai);
                }
            });
        });
    }

    function addToHistory(userMsg, aiReply) {
        chatHistory.unshift({ user: userMsg, ai: aiReply, timestamp: Date.now() });
        if(chatHistory.length > 50) chatHistory.pop();
        localStorage.setItem('sebastian_chat_history', JSON.stringify(chatHistory));
        renderHistory();
    }

    function appendMessage(text, isUser) {
        if(isUser) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', 'user-msg');
            msgDiv.innerText = text;
            messagesContainer.appendChild(msgDiv);
        } else {
            appendAiMessageWithCopy(text);
        }
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if(m === '&') return '&amp;';
            if(m === '<') return '&lt;';
            if(m === '>') return '&gt;';
            return m;
        });
    }

    async function getAIResponse(userMessage) {
        if(!openRouterApiKey || openRouterAp
