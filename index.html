<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Login - Silverwolf AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Poppins', 'Inter', system-ui, sans-serif;
            min-height: 100vh;
            background: url('https://files.catbox.moe/jr6biv.jpg') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 0;
        }

        .login-container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 420px;
            margin: 20px;
        }

        .login-card {
            background: rgba(20, 20, 30, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 32px 28px 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .logo-area {
            text-align: center;
            margin-bottom: 24px;
        }

        .logo-area img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 50%;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.5);
        }

        .logo-area h2 {
            color: white;
            margin-top: 16px;
            font-size: 28px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .logo-area p {
            color: rgba(255,255,255,0.7);
            font-size: 14px;
            margin-top: 4px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            color: rgba(255,255,255,0.9);
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            color: white;
            font-size: 16px;
            outline: none;
            transition: all 0.2s;
        }

        .input-group input:focus {
            border-color: #8b5cf6;
            background: rgba(0, 0, 0, 0.7);
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.3);
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #8b5cf6, #6d28d9);
            border: none;
            border-radius: 40px;
            color: white;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 12px;
        }

        button:hover {
            transform: scale(1.02);
            background: linear-gradient(135deg, #9b6eff, #7c3aed);
        }

        .error-msg {
            color: #ff6b6b;
            font-size: 13px;
            margin-top: 12px;
            text-align: center;
            background: rgba(0,0,0,0.6);
            padding: 8px;
            border-radius: 20px;
            display: none;
        }

        .music-control {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 999;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            border-radius: 50px;
            padding: 8px 16px;
            border: 1px solid rgba(255,255,255,0.2);
            cursor: pointer;
            transition: 0.2s;
        }

        .music-control:hover {
            background: rgba(139, 92, 246, 0.5);
        }

        .music-control button {
            all: unset;
            color: white;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .credits {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: rgba(255,255,255,0.5);
        }

        .credits span {
            color: #f472b6;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo-area">
                <img src="https://files.catbox.moe/qdv9bx.jpg" alt="Silverwolf Avatar">
                <h2>Silverwolf AI</h2>
                <p>Login to continue</p>
            </div>

            <div class="input-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="Enter username" autocomplete="off">
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••">
            </div>

            <button id="loginBtn">➤ Enter</button>
            <div id="errorMsg" class="error-msg"></div>
            <div class="credits">© Silverwolf AI · Private access | <span>Silverwolf bini gua jir</span></div>
        </div>
    </div>

    <audio id="bgMusic" loop preload="auto">
        <source src="https://files.catbox.moe/g0yx76.mp3" type="audio/mpeg">
    </audio>

    <div class="music-control" id="musicControl">
        <button id="musicToggleBtn">🔊 MUSIC</button>
    </div>

    <script>
        const validUsers = [
            { username: "xx1", password: "yt12", role: "member" },
            { username: "zepar", password: "virus", role: "ADMIN😈" }
        ];

        document.getElementById('loginBtn').addEventListener('click', function() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMsg');

            const user = validUsers.find(u => u.username === username && u.password === password);

            if (user) {
                localStorage.setItem('silverwolf_user', username);
                localStorage.setItem('silverwolf_role', user.role);
                localStorage.setItem('music_playing', 'false');
                window.location.href = 'chat.html';
            } else {
                errorDiv.style.display = 'block';
                errorDiv.innerText = 'Username atau password salah. Akses ditolak.';
                setTimeout(() => {
                    errorDiv.style.display = 'none';
                }, 3000);
            }
        });

        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('keypress', function(e) {
                if(e.key === 'Enter') {
                    document.getElementById('loginBtn').click();
                }
            });
        });

        const audio = document.getElementById('bgMusic');
        const toggleBtn = document.getElementById('musicToggleBtn');
        let isPlaying = false;
        let autoPlayAttempted = false;

        audio.volume = 0.5;

        function startMusic() {
            if (!isPlaying && !autoPlayAttempted) {
                autoPlayAttempted = true;
                audio.play().then(() => {
                    isPlaying = true;
                    toggleBtn.innerHTML = '🔊 MUSIC';
                }).catch(e => {
                    console.log('Autoplay blocked, menunggu interaksi user');
                    toggleBtn.innerHTML = '🔇 MUSIC';
                });
            }
        }

        startMusic();

        document.body.addEventListener('click', function onFirstClick() {
            if (!isPlaying) {
                audio.play().then(() => {
                    isPlaying = true;
                    toggleBtn.innerHTML = '🔊 MUSIC';
                }).catch(e => {});
            }
        }, { once: true });

        toggleBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            if (isPlaying) {
                audio.pause();
                isPlaying = false;
                toggleBtn.innerHTML = '🔇 MUSIC';
            } else {
                audio.play().then(() => {
                    isPlaying = true;
                    toggleBtn.innerHTML = '🔊 MUSIC';
                }).catch(e => {
                    console.error('Gagal play:', e);
                });
            }
        });
    </script>
</body>
</html>
