<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Support Dev - Sebastian AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Poppins', 'Inter', system-ui, sans-serif;
            min-height: 100vh;
            background: url('https://files.catbox.moe/zq79km.jpg') no-repeat center center fixed;
            background-size: cover;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 0;
        }

        .support-container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 500px;
            margin: 20px;
            animation: fadeInUp 0.5s ease;
        }

        .support-card {
            background: rgba(15, 15, 25, 0.9);
            backdrop-filter: blur(16px);
            border-radius: 48px;
            padding: 40px 28px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(139, 92, 246, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.1);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            color: white;
            font-size: 24px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-btn:hover {
            background: rgba(139, 92, 246, 0.6);
            transform: scale(1.05);
        }

        .avatar-section {
            margin-bottom: 24px;
        }

        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #8b5cf6, #6d28d9);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            box-shadow: 0 10px 30px rgba(139, 92, 246, 0.4);
        }

        .avatar span {
            font-size: 52px;
        }

        h1 {
            color: white;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .subtitle {
            color: rgba(255,255,255,0.6);
            font-size: 14px;
            margin-bottom: 32px;
        }

        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(139, 92, 246, 0.5), transparent);
            margin: 24px 0;
        }

        .social-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin: 32px 0;
        }

        .social-btn {
            display: flex;
            align-items: center;
            gap: 18px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 80px;
            padding: 14px 24px;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .social-btn:hover {
            background: rgba(139, 92, 246, 0.2);
            border-color: rgba(139, 92, 246, 0.5);
            transform: translateX(8px);
        }

        .social-logo {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
            background: white;
            padding: 8px;
        }

        .social-info {
            flex: 1;
            text-align: left;
        }

        .social-name {
            color: white;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .social-username {
            color: rgba(255,255,255,0.5);
            font-size: 12px;
        }

        .arrow-icon {
            color: rgba(255,255,255,0.4);
            font-size: 24px;
            transition: 0.2s;
        }

        .social-btn:hover .arrow-icon {
            color: #8b5cf6;
            transform: translateX(4px);
        }

        .credit-note {
            margin-top: 32px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
            font-size: 11px;
            color: rgba(255,255,255,0.4);
        }

        .credit-note a {
            color: #8b5cf6;
            text-decoration: none;
        }

        .version-badge {
            display: inline-block;
            background: rgba(139, 92, 246, 0.2);
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 10px;
            color: #a78bfa;
            margin-top: 16px;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* close animation */
        @keyframes fadeOutDown {
            to {
                opacity: 0;
                transform: translateY(30px);
            }
        }
    </style>
</head>
<body>
    <div class="support-container" id="supportContainer">
        <div class="support-card">
            <button class="close-btn" id="closeBtn">✕</button>
            
            <div class="avatar-section">
                <div class="avatar">
                    <span>💜</span>
                </div>
                <h1>Support Dev</h1>
                <div class="subtitle">Hubungi developer melalui sosial media</div>
            </div>

            <div class="social-grid">
                <!-- INSTAGRAM -->
                <a href="https://www.instagram.com/yamori_kou0?igsh=OHd3NWV4YjdvcjFz" 
                   target="_blank" 
                   rel="noopener noreferrer"
                   class="social-btn"
                   id="instagramBtn">
                    <img src="https://files.catbox.moe/4j5rqo.jpg" alt="Instagram" class="social-logo">
                    <div class="social-info">
                        <div class="social-name">Instagram</div>
                        <div class="social-username">@yamori_kou0</div>
                    </div>
                    <div class="arrow-icon">→</div>
                </a>

                <!-- TIKTOK -->
                <a href="https://www.tiktok.com/@rforroam?_r=1&_t=ZS-961rbsM2Skn" 
                   target="_blank" 
                   rel="noopener noreferrer"
                   class="social-btn"
                   id="tiktokBtn">
                    <img src="https://files.catbox.moe/xj3z68.jpg" alt="TikTok" class="social-logo">
                    <div class="social-info">
                        <div class="social-name">TikTok</div>
                        <div class="social-username">@rforroam</div>
                    </div>
                    <div class="arrow-icon">→</div>
                </a>
            </div>

            <div class="divider"></div>

            <div class="credit-note">
                <p>✨ Sebastian AI · Made with full dedication</p>
                <p>💬 Fast response | 24/7 support</p>
            </div>
            <div class="version-badge">⚡ eyeGPT Core · v2.0</div>
        </div>
    </div>

    <script>
        const closeBtn = document.getElementById('closeBtn');
        const supportContainer = document.getElementById('supportContainer');

        function closeAndRedirect() {
            supportContainer.style.animation = 'fadeOutDown 0.3s ease forwards';
            setTimeout(() => {
                window.close();
                // fallback: redirect ke chat.html jika window.close() tidak bekerja
                try {
                    if (window.history.length > 1) {
                        window.history.back();
                    } else {
                        window.location.href = 'chat.html';
                    }
                } catch(e) {
                    window.location.href = 'chat.html';
                }
            }, 300);
        }

        closeBtn.addEventListener('click', closeAndRedirect);

        // klik di luar card (background) juga bisa close
        supportContainer.addEventListener('click', function(e) {
            if (e.target === supportContainer) {
                closeAndRedirect();
            }
        });

        // tambahkan event tracking untuk social media (opsional)
        const igBtn = document.getElementById('instagramBtn');
        const ttBtn = document.getElementById('tiktokBtn');

        igBtn.addEventListener('click', function() {
            console.log('[Support] Opening Instagram: @yamori_kou0');
        });

        ttBtn.addEventListener('click', function() {
            console.log('[Support] Opening TikTok: @rforroam');
        });
    </script>
</body>
</html>
